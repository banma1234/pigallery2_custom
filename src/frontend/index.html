<!DOCTYPE html>
<html lang="en">
<head>
  <base href="<%= Config.Server.urlBase %>/"/>
  <meta charset="UTF-8">
  <title>Loading..</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- UI fonts: Inter (Latin) + Pretendard (Korean), referencing fab.com's modern sans look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="apple-touch-icon" href="favicon.svg">

  <link rel="manifest" crossorigin="use-credentials" href="manifest.json">

  <script>
    var ServerInject = {user:  <%- JSON.stringify(user); %>, ConfigInject: <%- JSON.stringify(Config); %>, UIExtensionConfigs:<%- JSON.stringify(UIExtensionConfigs); %>}
  </script>

  <script>
    <%- customHTMLHead %>
  </script>

</head>

<body style="overflow-y: scroll; padding-right: 0 !important;">
<app-pi-gallery2>
  <div style="position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    -webkit-transform: translate(-50%, -50%);
    left: 50%;
    text-align: center">
    <svg xmlns="http://www.w3.org/2000/svg"
         class="d-inline-block align-top"
         style="width: 200px;max-width: calc(50vw);max-height: calc(50vh);"
         fill="currentcolor"
         viewBox="<%- Config.Server.svgIcon.viewBox || '0 0 512 512' %>">
     <!-- <%- "-->"+Config.Server.svgIcon.items+"<!--" %> -->
    </svg>
    <h2 style="margin-top: 1em">Loading...</h2>
  </div>
</app-pi-gallery2>

<style>
  <%- usedTheme %>
</style>
</body>
</html>
